<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099ff"/>
      <stop offset="40%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a6c"/>
      <stop offset="60%" stop-color="#1a2a3c"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Left stroke of A — bright blue, angled -->
  <polygon points="88,28 108,28 58,172 38,172" fill="url(#left)" filter="url(#glow)"/>

  <!-- Right part — dark geometric arrow/chevron -->
  <polygon points="108,28 128,28 162,172 100,172 120,120 90,120" fill="url(#right)"/>

  <!-- Bright edge highlight on left stroke -->
  <line x1="88" y1="28" x2="38" y2="172" stroke="#00aaff" stroke-width="1" opacity="0.6"/>
</svg>
